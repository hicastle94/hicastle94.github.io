    function valueRotate(min,max,add,now){
        if(now + add < min) return max;
        if(now + add > max) return min;
        return now + add;
    }
    function valueInRange(min,max,add,now){
        if(now + add > max) return max;
        if(now + add < min) return min;
        return now + add;
    }
    function isInRange(min,max,now){
        if(now >= min && now <= max) return true;
        return false;
    }
    function max(a,b){
        if(a>= b) return a;
        else return b;
    }
    function min(a,b){
        if(a>= b) return b;
        else return a;
    }

    function decideBetting(){
        for(let i = 0; i < victimList.length ; i++){
            var a = (Math.random()*10000 < victimList[i].interest);
            if(a == true && victimList[i].betwho == -1){
                var b = Math.floor(Math.random() * victimList[i].risky / 10 * victimList[i].point) + 1;
                b = min (b, victimList[i].point);
                Bet(i,b,Math.floor(Math.random()*4));
            }
        }
    }
    function Bet(who, amount, target){
        victimList[who].betwho = target;
        victimList[who].bet = amount;
        victimList[who].point -= amount;
        victimList[who].earn -= amount;
        turtleOnLane[target].bet += amount;
        totalBet += amount;
    }
    function BetResult(winner){
        for(let i = 0; i < victimList.length ; i++){
            if(victimList[i].betwho == winner){
                victimList[i].point += Math.floor(victimList[i].bet * turtleOnLane[winner].multiplier);
                victimList[i].earn += Math.floor(victimList[i].bet * turtleOnLane[winner].multiplier);
            }
        }
    }
