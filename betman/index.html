    function valueRotate(min,max,add,now){
        if(now + add < min) return max;
        if(now + add > max) return min;
        return now + add;
    }
    function valueInRange(min,max,add,now){
        if(now + add > max) return max;
        if(now + add < min) return min;
        return now + add;
    }
    function isInRange(min,max,now){
        if(now >= min && now <= max) return true;
        return false;
    }
    function max(a,b){
        if(a>= b) return a;
        else return b;
    }
    function min(a,b){
        if(a>= b) return b;
        else return a;
    }

    function calculateTurnOrder(){
        var arr = [];
        for(let i = 0; i < 4 ; i++){
            if(p1char[i].alive)
                arr.push( {slot:i ,left:(10000 - p1char[i].wait)/p1char[i].nowspd, wait:p1char[i].wait} );
            if(p2char[i].alive)
                arr.push( {slot:i+4 ,left:(10000 - p2char[i].wait)/p2char[i].nowspd, wait:p2char[i].wait} );
        }
        arr.sort(function(a,b){
            if( a.wait >= 10000 && b.wait >= 10000){
                if(a.wait > b.wait) return -1;
                if(a.wait == b.wait) return 0;
                if(a.wait < b.wait) return 1;
            }
            if( a.wait >= 10000 && b.wait < 10000) return -1;
            if( a.wait < 10000 && b.wait >= 10000) return 1;
            else{
                if( a.left < b. left ) return -1;
                if( a.left == b. left ) return 0;
                if( a.left > b. left ) return 1;
            }
        });

        turnOrder = [];
        for(let i = 0; i < arr.length ; i++){
            turnOrder.push(arr[i].slot);
        }
    }
    function refreshTurnIndicator(){
        sc2turnIndicator.setX(400);
        sc2turnIndicator.setVisible(false);
        for(let i = 0 ; i < min(turnOrder.length, 8) ; i++){
            sc2turnIndicator.getChildren()[i].setTexture(slotToObject(turnOrder[i]).name);
            sc2turnIndicator.getChildren()[i].setCrop(0,10,30,20);
            sc2turnIndicator.getChildren()[i].setVisible(true);
            sc2turnIndicator.getChildren()[i].x += ( (turnOrder[i]<4)? -10:10);
        }
        sc2specialTurnIndicator.setX(400);
        sc2specialTurnIndicator.setY(350,30);
        sc2specialTurnIndicator.setVisible(false);
        for(let i = 0 ; i < specialOrder.length ; i++){
            sc2specialTurnIndicator.getChildren()[i].setTexture(slotToObject(specialOrder[i]).name);
            sc2specialTurnIndicator.getChildren()[i].setCrop(0,10,30,20);
            sc2specialTurnIndicator.getChildren()[i].setVisible(true);
            sc2specialTurnIndicator.incY(-30);
            sc2specialTurnIndicator.getChildren()[i].x += ( (specialOrder[i]<4)? -10:10);
        }
    }

    function nextTurn(){
        if(specialOrder.length > 0){
            calculateTurnOrder();
            refreshTurnIndicator();
            isSpecialTurn = 1;
            startTurn(specialOrder[0]);
        }
        if(specialOrder.length == 0){
            // if(giveturnflag == 1){
            //     giveturnflag = 0;
            //     refreshTurnIndicator();
            //     isSpecialTurn = 0;
            //     startTurn(turnOrder[0]);
            //     return;
            // }

            while(1){
                var br = 0;
                for(let i = 0; i < 4 ; i++){
                    if(p1char[i].alive==1 && p1char[i].wait >= 10000) br=1;
                    if(p2char[i].alive==1 && p2char[i].wait >= 10000) br=1;
                }
                if(br) break;
                for(let i = 0; i < 4 ; i++){
                    p1char[i].wait += p1char[i].nowspd;
                    p2char[i].wait += p2char[i].nowspd;
                }
            }
            calculateTurnOrder();
            refreshTurnIndicator();
            isSpecialTurn = 0;
            startTurn(turnOrder[0]);
        }
        
    }
    function startTurn(slot){
        thisturn = slot;
        turnOwner = (slot<4)?1:2;
        slotToObject(slot).imgGroup.incX((slot<4)?40:-40);
        setSelectMove(0);
        drawMoveButton(slot);
        autoTarget();
        moveTarget('none');
        refreshTargetIndicator();
    }
    function drawMoveButton(slot){
        var portXY;
        if(slot < 4){
            portXY = slotToObject(slot).image.getTopRight();
            sc2movebuttton.forEach(function(value){
                value.setXY(portXY.x + 40, portXY.y).setOrigin(0,0);
            });
        }
        else{
            portXY = slotToObject(slot).image.getTopLeft();  
            sc2movebuttton.forEach(function(value){
                value.setXY(portXY.x - 40, portXY.y).setOrigin(1,0);
            });
        }
        
        sc2movebuttton.forEach(function(value){
            value.setVisible(false);
        });
        if(isSpecialTurn){
            sc2movebuttton[2].setVisible(true);
        }
        else{
            sc2movebuttton[0].setVisible(true);
            if(isSkillAvailable(turnOwner,1)){
                sc2movebuttton[1].setVisible(true);
                sc2movebuttton[1].incY(60); 
            }       
        }
    }
    function setSelectMove(move){

        else if(move == 1){

        }

        for(let i = 0 ; i < sc2movebuttton.length ; i++){
            sc2movebuttton[i].getChildren()[0].setStrokeStyle((i == moveselect)?4:0,0);
        }
        moveTarget('none');

        if(moveselect == 0)setInstruction('평타공격력 : ' + slotToObject(thisturn).atk.move[0].attack);
        else if(moveselect == 1)setInstruction(slotToObject(thisturn).satk.desc);
        else if(moveselect == 2)setInstruction(slotToObject(thisturn).special.desc);
    }



    function refreshTargetIndicator(){
        var target = slotToObject(targetselect).image.getCenter();
        sc2target.setPosition(target.x, target.y);

        sc2subtarget.setVisible(false);

            sc2subtarget.getChildren()[i].setPosition(subXY.x,subXY.y);
            sc2subtarget.getChildren()[i].setVisible(true);
        }
    }
    function autoTarget(){
        if(turnOwner == 1) targetselect = 4+lowestHP(p2char);
        if(turnOwner == 2) targetselect = lowestHP(p1char);
    }
    function lowestHP(charArr){
        var ret = 0;
        var lowest = 9999;
        for(let i = 0; i < 4; i++){
            if(charArr[i].alive == 1 && charArr[i].nowhp < lowest){
                lowest = charArr[i].nowhp;
                ret = i;
            }
        }
        return ret;
    }
    function moveTarget(direction){
        if(direction == 'up'){
            do{
                targetselect = valueRotate(0,7,-1,targetselect);
            }while(setTarget(targetselect) == false);
        }
        if(direction == 'down'){
            do{
                targetselect = valueRotate(0,7,+1,targetselect);
            }while(setTarget(targetselect) == false);
        }

        if(direction == 'left'){
            if(targetselect >= 4) setTarget(targetselect-4);
        } 
        if(direction == 'right'){
            if(targetselect < 4) setTarget(targetselect+4);  
        }

        if(direction == 'none'){
            while(setTarget(targetselect) == false){
                targetselect = valueRotate(0,7,+1,targetselect);
            }   
        }

        triggerBuff(thisturn,'selecttarget');
        refreshTargetIndicator();
    }
    function setTarget(slot,moveID = moveselect){
        
        var ch = slotToObject(thisturn);
        var move = {};
        
        if(moveID == 0) move = ch.atk;
        // {
        //     if(slotToObject(slot).alive == 0) return false;
        //     if(slotToObject(slot).name == '나레이터'){
        //         if(countAlive( (getTeamFromSlot(thisturn)==1)?2:1 ) > 1) return false;
        //     }

        //     if(getTeamFromSlot(thisturn) == 1) return isInRange(4,7,slot);
        //     if(getTeamFromSlot(thisturn) == 2) return isInRange(0,3,slot);
        // }
        else if(moveID == 1) move = ch.satk;
        else if(moveID == 2) move = ch.special;

        var isValidTarget = false;
        if(move.aim == 'enemy'){
            if(getTeamFromSlot(thisturn) == 1) isValidTarget = isInRange(4,7,slot);
            if(getTeamFromSlot(thisturn) == 2) isValidTarget = isInRange(0,3,slot);
            if(slotToObject(slot).alive == 0) isValidTarget = false;
        }
        else if(move.aim == 'friend'){
            if(getTeamFromSlot(thisturn) == 1) isValidTarget = isInRange(0,3,slot);
            if(getTeamFromSlot(thisturn) == 2) isValidTarget = isInRange(4,7,slot);
            if(slotToObject(slot).alive == 0) isValidTarget = false;
        }
        else if(move.aim == 'any'){
            isValidTarget = isInRange(0,7,slot);;
            if(slotToObject(slot).alive == 0) isValidTarget = false;
        }
        else if(move.aim == 'self'){
            isValidTarget = (slot == thisturn);
            // if(slotToObject(slot).alive == 0) isValidTarget = false;
        }
        else if(move.aim == 'deadfriend'){
            if(slotToObject(slot).alive == 1) isValidTarget = false;
            else{
                if(getTeamFromSlot(thisturn) == 1) isValidTarget = isInRange(0,3,slot);
                if(getTeamFromSlot(thisturn) == 2) isValidTarget = isInRange(4,7,slot);
            }
        }

        if(slotToObject(slot).name == '나레이터'){
            if(countAlive( (getTeamFromSlot(thisturn)==1)?2:1 ) > 1) isValidTarget = false;
            if(move.aim == 'friend' || move.aim == 'self') isValidTarget = true;
        }

        if(isValidTarget == true){
            targetselect = slot;
            subtarget = [];
        }

        if(isValidTarget == true){
            if(move.target == 'single'){
                subtarget = [];
            }
            if(move.target == 'all'){
                if(move.aim == 'enemy'){
                    for(let i = 0 ; i < 8 ; i++){
                        if(getTeamFromSlot(thisturn) == 1){
                            if(isInRange(0,3,i) == true) continue;
                        }
                        else if(getTeamFromSlot(thisturn) == 2){
                            if(isInRange(4,7,i) == true) continue;
                        }
                        if( i == slot ) continue;
                        if(slotToObject(i).alive == 0) continue;
                        addSubtarget(i);
                    }
                }
                else if(move.aim == 'friend'){
                    for(let i = 0 ; i < 8 ; i++){
                        if(getTeamFromSlot(thisturn) == 1){
                            if(isInRange(4,7,i) == true) continue;
                        }
                        else if(getTeamFromSlot(thisturn) == 2){
                            if(isInRange(0,3,i) == true) continue;
                        }
                        if( i == slot ) continue;
                        if(slotToObject(i).alive == 0) continue;
                        addSubtarget(i);
                    }
                }
                else if(move.aim == 'any'){
                    for(let i = 0 ; i < 8 ; i++){
                        if( i == slot ) continue;
                        if(slotToObject(i).alive == 0) continue;
                        addSubtarget(i);
                    }
                }
                else if(move.aim == 'self'){
                    for(let i = 0 ; i < 8 ; i++){
                        if( i == slot ) continue;
                        if(slotToObject(i).alive == 0) continue;
                        addSubtarget(i);
                    }
                }
                else if(move.aim == 'deadfriend'){
                    for(let i = 0 ; i < 8 ; i++){
                        if(getTeamFromSlot(thisturn) == 1){
                            if(isInRange(4,7,i) == true) continue;
                        }
                        else if(getTeamFromSlot(thisturn) == 2){
                            if(isInRange(0,3,i) == true) continue;
                        }
                        if( i == slot ) continue;
                        if(slotToObject(i).alive == 1) continue;
                        addSubtarget(i);
                    }
                }
            }
            if(move.target == 'splash'){
                if(move.aim == 'enemy'){
                    var min = (getTeamFromSlot(thisturn) == 1)? 4:0;
                    var max = (getTeamFromSlot(thisturn) == 1)? 7:3;

                    var j = valueInRange(min,max,+1,slot);
                    if(slotToObject(j).alive == 1 && j != slot) addSubtarget(j);
                    else{
                        j = valueInRange(min,max,+2,slot);
                        if(slotToObject(j).alive == 1 && j != slot) addSubtarget(j);
                    } 

                    j = valueInRange(min,max,-1,slot);
                    if(slotToObject(j).alive == 1 && j != slot) addSubtarget(j);
                    else{
                        j = valueInRange(min,max,-2,slot);
                        if(slotToObject(j).alive == 1 && j != slot) addSubtarget(j);
                    } 
                }
                else if(move.aim == 'friend'){
                }
                else if(move.aim == 'any'){
                }
                else if(move.aim == 'self'){
                }
                else if(move.aim == 'deadfriend'){
                }
            }
        }
        return isValidTarget;
    }
    function addSubtarget(slot){

        if(slotToObject(slot).name == '나레이터'){
            //if(move.aim == 'friend' || move.aim == 'self') 1;
            if(countAlive( (getTeamFromSlot(thisturn)==1)?2:1 ) > 1) return;
        }

        subtarget.push(slot);
    }

    function endTurn(){

        if(!isSpecialTurn){
            buffTurn(thisturn);
        }

        refreshCharacterStatus();
        if(checkWin()){
            endsong.play();
            return;   
        }
        slotToObject(thisturn).imgGroup.incX((thisturn<4)?-40:40);
        nextTurn();
    }
    

    function dealDamage(targetSlot,damage){
        var def_ch = slotToObject(targetSlot);
        var finaldamage = triggerBuff(targetSlot,'hit',damage);
        def_ch.nowhp = valueInRange(0,def_ch.maxhp,-finaldamage,def_ch.nowhp);
        def_ch.nowhp = Math.trunc(def_ch.nowhp);
        if(def_ch.nowhp == 0) dead(targetSlot);
        def_ch.nowenergy = valueInRange(0,def_ch.maxenergy,+10,def_ch.nowenergy);
    }
    function heal(targetSlot,amount){
        var def_ch = slotToObject(targetSlot);
        def_ch.nowhp = valueInRange(0,def_ch.maxhp, amount, def_ch.nowhp);
    }
    function addEnergy(targetSlot,amount){
        var def_ch = slotToObject(targetSlot);
        def_ch.nowenergy = valueInRange(0,def_ch.maxenergy, amount, def_ch.nowenergy);   
    }
    function addWait(targetSlot,amount){
        var def_ch = slotToObject(targetSlot);
        def_ch.wait += amount;
        if(def_ch.wait < 0) def_ch.wait = 0;
    }
    function setWait(targetSlot,amount){
        var def_ch = slotToObject(targetSlot);
        def_ch.wait = amount;
        if(def_ch.wait < 0) def_ch.wait = 0;
    }
    function modSpeed(targetSlot,amount){
        var def_ch = slotToObject(targetSlot);
        def_ch.nowspd *= amount;
    }
    function kill(targetSlot){
        var def_ch = slotToObject(targetSlot);
        def_ch.nowhp = 0;
        dead(targetSlot);
    }
    function giveTurn(targetSlot){
        var def_ch = slotToObject(targetSlot);
        def_ch.wait = max(10000,slotToObject(turnOrder[1]).wait + 1);
        if(targetSlot == thisturn) def_ch.wait += 10000;
        // turnOrder.forEach(function(value, index){
        //     if(value == targetSlot) turnOrder.splice(index,1);
        // })
        // turnOrder.unshift(targetSlot);
        // giveturnflag = 1;
    }
    function forceSpecial(targetSlot){
        queueSpecial(targetSlot);
    }
    function transform(targetSlot, newchar){
        loadSpecialCharacter(getTeamFromSlot(targetSlot), targetSlot + 4 - getTeamFromSlot(targetSlot)*4, newchar);
    }
    function fixtarget(){

    }


    function addBuff(targetSlot,buff){
        var def_ch = slotToObject(targetSlot);
        def_ch.buff.push(Object.assign({},buff));
    }
    function buffCount(buff){
        if(buff.hasOwnProperty('count')){
            buff.count--;
        }
    }
    function buffTurn(slot){
        slotToObject(slot).buff.forEach(function(value,index){
            if(value.hasOwnProperty('turn')){
                value.turn--;
            } 
        });
        slotToObject(slot).buff.forEach(function(value,index){
            if(value.hasOwnProperty('turn')){
                if(value.turn <= 0) slotToObject(slot).buff.splice(index,1);
            } 
        });
    }
    function triggerBuff(slot,condition,param){
        var ret;
        ret=param;
        if(condition == 'hit'){
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'hit'){
                    if(value.hasOwnProperty('adddamage')){
                        ret += value.adddamage;
                    }
                    if(value.hasOwnProperty('moddamage')){
                        ret *= value.moddamage;
                    }
                }
            });
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'hit'){
                    if(value.hasOwnProperty('setdamage')){
                        ret = value.setdamage;
                    }
                }
            });

            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'hit'){
                    if(value.hasOwnProperty('count')){  
                        value.count--;
                    }
                }
            });
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'hit'){
                    if(value.hasOwnProperty('count')){  
                        if(value.count <= 0) slotToObject(slot).buff.splice(index,1);
                    }
                }
            });
        }
//attack sattack special
        if(condition == 'damage'){
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'damage'){
                    if(value.hasOwnProperty('adddamage')){
                        ret += value.adddamage;
                    }
                    if(value.hasOwnProperty('moddamage')){
                        ret *= value.moddamage;
                    }
                }
            });
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'damage'){
                    if(value.hasOwnProperty('setdamage')){
                        ret = value.setdamage;
                    }
                }
            });
            
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'damage'){
                    if(value.hasOwnProperty('count')){  
                        value.count--;
                    }
                }
            });
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'damage'){
                    if(value.hasOwnProperty('count')){  
                        if(value.count <= 0) slotToObject(slot).buff.splice(index,1);
                    }
                }
            });
        }

        if(condition == 'death'){
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'death'){
                    if(value.hasOwnProperty('transform')){
                        transform(slot, value.transform);
                    }
                    if(value.hasOwnProperty('stoploop')){
                        aggrosong.stop();
                    }
                }
            });
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'death'){
                    if(value.hasOwnProperty('count')){  
                        value.count--;
                    }
                }
            });
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'death'){
                    if(value.hasOwnProperty('count')){  
                        if(value.count <= 0) slotToObject(slot).buff.splice(index,1);
                    }
                }
            });
        }

        if(condition == 'selecttarget'){
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'selecttarget'){
                    if(value.hasOwnProperty('fixtarget')){
                        if(getSlotFromName(value.fixtarget) != -1){
                            setTarget(getSlotFromName(value.fixtarget));
                        }
                    }
                }
            });
        }

        if(condition == 'selectmove'){
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'selectmove'){
                    if(value.hasOwnProperty('banskill')){
                        ret = 0;
                    }
                }
            });
        }

        return ret;
    }

    function dead(slot){
        var ch = slotToObject(slot);
        ch.alive = 0;
        triggerBuff(slot,'death');
    }
    function countAlive(team){
        var p1survivor = 0, p2survivor = 0;
        for(let i = 0 ; i < 4 ; i++){
            p1survivor += p1char[i].alive;
            p2survivor += p2char[i].alive;
        }
        if(team == 1) return p1survivor;
        if(team == 2) return p2survivor;
        return -1;
    }
    function checkWin(){
        var p1survivor = 0, p2survivor = 0;
        for(let i = 0 ; i < 4 ; i++){
            p1survivor += p1char[i].alive;
            p2survivor += p2char[i].alive;
        }
        if(p1survivor == 0 && p2survivor == 0) setInstruction('무승부입니다');
        else if(p1survivor == 0) setInstruction('2p의 승리입니다');
        else if(p2survivor == 0) setInstruction('1p의 승리입니다');
        else return 0;
        return 1;
    }

    function setInstruction(str){
        instruction.setText(str);
    }

    function attack(slot){
        var ch = slotToObject(thisturn);
        
        var thisattack = ch.atk;
        doMoveset(ch.atk.move);
        // thisattack = triggerBuff(thisturn,'damage',thisattack);
        // dealDamage(targetselect, thisattack);

        addSkillpoint(getTeamFromSlot(thisturn),+1);
        ch.nowenergy = valueInRange(0,ch.maxenergy,20,ch.nowenergy);
        ch.wait -= 10000;
        if(ch.wait < 0 ) ch.wait =0;
        endTurn();
    }
    function doMoveset(moveset){
        moveset.forEach(function(value){
            if(value.target == 'main' || value.target == 'both'){
                if(value.hasOwnProperty('attack')){
                    var thisattack = value.attack;
                    thisattack = triggerBuff(thisturn,'damage',thisattack);
                    dealDamage(targetselect, thisattack);
                }
                if(value.hasOwnProperty('heal')) heal(targetselect, value.heal);
                if(value.hasOwnProperty('energy')) addEnergy(targetselect, value.energy);
                if(value.hasOwnProperty('wait')) addWait(targetselect, value.wait);
                if(value.hasOwnProperty('setwait')) setWait(targetselect, value.setwait);
                if(value.hasOwnProperty('addskillpoint')) addSkillpoint(getTeamFromSlot(targetselect), value.addskillpoint);
                if(value.hasOwnProperty('buff')) addBuff(targetselect, value.buff);

                if(value.hasOwnProperty('death')) kill(targetselect);
                if(value.hasOwnProperty('giveturn')) giveTurn(targetselect);

                if(value.hasOwnProperty('forcespecial')) forceSpecial(targetselect);
                if(value.hasOwnProperty('transform')) transform(targetselect,value.transform);
                if(value.hasOwnProperty('modspeed')) modSpeed(targetselect,value.modspeed);
                if(value.hasOwnProperty('loopsound')) aggrosong.play();
            }
            if(value.target == 'sub' || value.target == 'both'){
                for(let i = 0; i < subtarget.length ; i++){
                     if(value.hasOwnProperty('attack')){
                        var thisattack = value.attack;
                        thisattack = triggerBuff(thisturn,'damage',thisattack);
                        dealDamage(subtarget[i], thisattack);
                    }
                    if(value.hasOwnProperty('heal')) heal(subtarget[i], value.heal);
                    if(value.hasOwnProperty('energy')) addEnergy(subtarget[i], value.energy);
                    if(value.hasOwnProperty('wait')) addWait(subtarget[i], value.wait);
                    if(value.hasOwnProperty('setwait')) setWait(subtarget[i], value.setwait);
                    if(value.hasOwnProperty('addskillpoint')) addSkillpoint(getTeamFromSlot(subtarget[i]), value.addskillpoint);
                    if(value.hasOwnProperty('buff')) addBuff(subtarget[i], value.buff);

                    if(value.hasOwnProperty('death')) kill(subtarget[i]);
                    if(value.hasOwnProperty('giveturn')) giveTurn(subtarget[i]);
                }
            }
        })
    }
    function sattack(slot){
        var ch = slotToObject(thisturn);
        
        doMoveset(ch.satk.move);

        addSkillpoint(getTeamFromSlot(thisturn),-1);
        ch.nowenergy = valueInRange(0,ch.maxenergy,30,ch.nowenergy);
        ch.wait -= 10000;
        if(ch.wait < 0 ) ch.wait =0;
        endTurn();
    }
    function special(slot){
        var ch = slotToObject(thisturn);
        
        doMoveset(ch.special.move);

        ch.nowenergy = 0;
        ch.specialReserved = false;
        specialOrder.shift();
        endTurn();
    }
    function queueSpecial(slot){
        specialOrder.push(slot);
        slotToObject(slot).specialReserved = true;
        refreshTurnIndicator();
        if(isSpecialTurn == 0){
            endTurn();
        }
    }

    function refreshCharacterStatus(){
        for(let i = 0 ; i < 8 ; i++){
            var char = slotToObject(i);
            char.hpbar.setSize(90*(char.nowhp/char.maxhp),10);
            char.hptext.setText(char.nowhp+'/'+char.maxhp);
            char.energybar.setSize(90*(char.nowenergy/char.maxenergy),10);
            char.energytext.setText(char.nowenergy+'/'+char.maxenergy);
            if(char.alive == 0) char.image.setTint(0x400000);

            if(char.nowenergy >= char.maxenergy)    char.specialbutton.setVisible(true);
            else                                    char.specialbutton.setVisible(false);
        }
    }

    function isTargetExist(charSlot,move){
        var savetarget = targetselect;
        var savethisturn = thisturn;
        var targetexist = 0;
        thisturn = charSlot;
        for(let i = 0 ; i < 8 ; i++){
            if(setTarget(i,move) == true) targetexist++;
        }
        targetselect = savetarget;
        thisturn = savethisturn;
        return (targetexist > 0);
    }
    function isSpecialAvailable(slot){
        return (slotToObject(slot).alive == 1 && slotToObject(slot).nowenergy >=slotToObject(slot).maxenergy && slotToObject(slot).specialReserved == 0 && isTargetExist(slot,2) == 1);
    }
    function isSkillAvailable(player,cost){
        if(isTargetExist(thisturn, 1) == 0) return 0;
        if(triggerBuff(thisturn,'selectmove',1) == 0) return 0;

        if(skill[player-1] >= cost) return 1;
        return 0;
    }
    function addSkillpoint(player,add){
        skill[player-1] = valueInRange(0,5,add,skill[player-1]);
        refreshSkillIndicator();
    }
    function refreshSkillIndicator(){
        for(let i = 0; i < 5; i++){
            skillIndicator1.getChildren()[i].setVisible( (i < skill[0]) );
            skillIndicator2.getChildren()[i].setVisible( (i < skill[1]) );
        }
    }

    function countAlive(team){
        var p1survivor = 0, p2survivor = 0;
        for(let i = 0 ; i < 4 ; i++){
            p1survivor += p1char[i].alive;
            p2survivor += p2char[i].alive;
        }
        if(team == 1) return p1survivor;
        if(team == 2) return p2survivor;
        return -1;
    }
    function getTeamFromSlot(slot){
        if(slot < 4) return 1;
        else return 2;
    }
    function getSlotFromName(name){
        for(let i = 0 ; i < 8 ; i++){
            if(slotToObject(i).name == name) return i;
        }
        return -1;
    }

    

    var config = {
        type: Phaser.AUTO,
        width: 1080,
        height: 2400,
        physics: {
            default: 'arcade'
        },
        scene: [Scene1,Scene2],
        parent : "gamewindow"
    };

    var game = new Phaser.Game(config);
