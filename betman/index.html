    function valueRotate(min,max,add,now){
        if(now + add < min) return max;
        if(now + add > max) return min;
        return now + add;
    }
    function valueInRange(min,max,add,now){
        if(now + add > max) return max;
        if(now + add < min) return min;
        return now + add;
    }
    function isInRange(min,max,now){
        if(now >= min && now <= max) return true;
        return false;
    }
    function max(a,b){
        if(a>= b) return a;
        else return b;
    }
    function min(a,b){
        if(a>= b) return b;
        else return a;
    }

    function pickReady(player){
        instruction.setText('player'+player+', 캐릭터를 선택하세요');
        turnOwner = player;
        selectXY = lastCursor[player-1];
        selectCursor = XYtoID(selectXY);
        while(isDisabled(selectCursor)) selectCursor = valueRotate(0, sc1List.length-1, 1, selectCursor);
        selectXY = IDtoXY(selectCursor);
        refreshCursor();
        sc1refresh();
    }
    function pick(player,character){
        loadCharacter(player,pickCount[player-1],character);
        if(player == 1){
            sc1List[selectCursor].setTint(0xff0000);
        }
        else if(player == 2){
            sc1List[selectCursor].setTint(0x0000ff);
        }
        sc1List[selectCursor].setData('picked',1);
        pickCount[player-1]++;
        lastCursor[player-1] = selectXY;

        var pickSum = pickCount[0] + pickCount[1];
        if(pickSum == 8) endScene1();
        else pickReady(pickOrder[pickSum]);
    }
    function moveScene1Cursor(direction){
        if(direction == 'up'){
            selectXY[1] = valueRotate(0, Math.floor(sc1List.length/6),-1,selectXY[1]);
            while(isDisabled(XYtoID(selectXY))) selectXY[1] = valueRotate(0, Math.floor(sc1List.length/6),-1,selectXY[1]);
        }
        if(direction == 'down'){
            selectXY[1] = valueRotate(0, Math.floor(sc1List.length/6),+1,selectXY[1]);
            while(isDisabled(XYtoID(selectXY))) selectXY[1] = valueRotate(0, Math.floor(sc1List.length/6),+1,selectXY[1]);
        }
        if(direction == 'left'){
            selectXY[0] = valueRotate(0, 5, -1, selectXY[0]);
            while(isDisabled(XYtoID(selectXY))) selectXY[0] = valueRotate(0, 5, -1, selectXY[0]);
        }
        if(direction == 'right'){
            selectXY[0] = valueRotate(0, 5, +1, selectXY[0]);
            while(isDisabled(XYtoID(selectXY))) selectXY[0] = valueRotate(0, 5, +1, selectXY[0]);
        }
        if(XYtoID(selectXY) >= sc1List.length) selectXY = IDtoXY(sc1List.length-1);
        selectCursor = XYtoID(selectXY);
        refreshCursor();
        sc1refresh();
    }

    function calculateTurnOrder(){
        var arr = [];
        for(let i = 0; i < 4 ; i++){
            if(p1char[i].alive)
                arr.push( {slot:i ,left:(10000 - p1char[i].wait)/p1char[i].nowspd, wait:p1char[i].wait} );
            if(p2char[i].alive)
                arr.push( {slot:i+4 ,left:(10000 - p2char[i].wait)/p2char[i].nowspd, wait:p2char[i].wait} );
        }
        arr.sort(function(a,b){
            if( a.wait >= 10000 && b.wait >= 10000){
                if(a.wait > b.wait) return -1;
                if(a.wait == b.wait) return 0;
                if(a.wait < b.wait) return 1;
            }
            if( a.wait >= 10000 && b.wait < 10000) return -1;
            if( a.wait < 10000 && b.wait >= 10000) return 1;
            else{
                if( a.left < b. left ) return -1;
                if( a.left == b. left ) return 0;
                if( a.left > b. left ) return 1;
            }
        });

        turnOrder = [];
        for(let i = 0; i < arr.length ; i++){
            turnOrder.push(arr[i].slot);
        }
    }

            sc2turnIndicator.getChildren()[i].setCrop(0,10,30,20);

            while(1){
                var br = 0;
                for(let i = 0; i < 4 ; i++){

                    if(p2char[i].alive==1 && p2char[i].wait >= 10000) br=1;

    function moveTarget(direction){
        if(direction == 'up'){
            do{
                targetselect = valueRotate(0,7,-1,targetselect);

        }
        if(direction == 'down'){
            do{
                targetselect = valueRotate(0,7,+1,targetselect);
            }while(setTarget(targetselect) == false);
        }

        if(direction == 'left'){
            if(targetselect >= 4) setTarget(targetselect-4);
        } 
        if(direction == 'right'){
            if(targetselect < 4) setTarget(targetselect+4);  
        }

        if(direction == 'none'){
            while(setTarget(targetselect) == false){
                targetselect = valueRotate(0,7,+1,targetselect);

    function triggerBuff(slot,condition,param){
        var ret;
        ret=param;
        if(condition == 'hit'){
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'hit'){
                    if(value.hasOwnProperty('adddamage')){
                        ret += value.adddamage;
                    }
                    if(value.hasOwnProperty('moddamage')){
                        ret *= value.moddamage;
                    }
                }
            });
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'hit'){
                    if(value.hasOwnProperty('setdamage')){
                        ret = value.setdamage;
                    }
                }
            });

            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'hit'){
                    if(value.hasOwnProperty('count')){  
                        value.count--;
                    }
                }
            });
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'hit'){
                    if(value.hasOwnProperty('count')){  
                        if(value.count <= 0) slotToObject(slot).buff.splice(index,1);
                    }
                }
            });
        }
//attack sattack special
        if(condition == 'damage'){
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'damage'){
                    if(value.hasOwnProperty('adddamage')){
                        ret += value.adddamage;
                    }
                    if(value.hasOwnProperty('moddamage')){
                        ret *= value.moddamage;
                    }
                }
            });
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'damage'){
                    if(value.hasOwnProperty('setdamage')){
                        ret = value.setdamage;
                    }
                }
            });
            
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'damage'){
                    if(value.hasOwnProperty('count')){  
                        value.count--;
                    }
                }
            });
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'damage'){
                    if(value.hasOwnProperty('count')){  
                        if(value.count <= 0) slotToObject(slot).buff.splice(index,1);
                    }
                }
            });
        }

        if(condition == 'death'){
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'death'){
                    if(value.hasOwnProperty('transform')){
                        transform(slot, value.transform);
                    }
                    if(value.hasOwnProperty('stoploop')){
                        aggrosong.stop();
                    }
                }
            });
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'death'){
                    if(value.hasOwnProperty('count')){  
                        value.count--;
                    }
                }
            });
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'death'){
                    if(value.hasOwnProperty('count')){  
                        if(value.count <= 0) slotToObject(slot).buff.splice(index,1);
                    }
                }
            });
        }

        if(condition == 'selecttarget'){
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'selecttarget'){
                    if(value.hasOwnProperty('fixtarget')){
                        if(getSlotFromName(value.fixtarget) != -1){
                            setTarget(getSlotFromName(value.fixtarget));
                        }
                    }
                }
            });
        }

        if(condition == 'selectmove'){
            slotToObject(slot).buff.forEach(function(value,index){
                if(value.condition == 'selectmove'){
                    if(value.hasOwnProperty('banskill')){
                        ret = 0;
                    }
                }
            });
        }

        return ret;
    }

    function countAlive(team){

        for(let i = 0 ; i < 4 ; i++){

            p2survivor += p2char[i].alive;

    function checkWin(){

        for(let i = 0 ; i < 4 ; i++){
            p1survivor += p1char[i].alive;
            p2survivor += p2char[i].alive;
        }
        if(p1survivor == 0 && p2survivor == 0) setInstruction('무승부입니다');
        else if(p1survivor == 0) setInstruction('2p의 승리입니다');
        else if(p2survivor == 0) setInstruction('1p의 승리입니다');
        else return 0;
        return 1;

        addSkillpoint(getTeamFromSlot(thisturn),+1);

    function doMoveset(moveset){
        moveset.forEach(function(value){
            if(value.target == 'main' || value.target == 'both'){
                if(value.hasOwnProperty('attack')){
                    var thisattack = value.attack;
                    thisattack = triggerBuff(thisturn,'damage',thisattack);
                    dealDamage(targetselect, thisattack);
                }
                if(value.hasOwnProperty('heal')) heal(targetselect, value.heal);
                if(value.hasOwnProperty('energy')) addEnergy(targetselect, value.energy);
                if(value.hasOwnProperty('wait')) addWait(targetselect, value.wait);
                if(value.hasOwnProperty('setwait')) setWait(targetselect, value.setwait);
                if(value.hasOwnProperty('addskillpoint')) addSkillpoint(getTeamFromSlot(targetselect), value.addskillpoint);
                if(value.hasOwnProperty('buff')) addBuff(targetselect, value.buff);

                if(value.hasOwnProperty('death')) kill(targetselect);
                if(value.hasOwnProperty('giveturn')) giveTurn(targetselect);

                if(value.hasOwnProperty('forcespecial')) forceSpecial(targetselect);
                if(value.hasOwnProperty('transform')) transform(targetselect,value.transform);
                if(value.hasOwnProperty('modspeed')) modSpeed(targetselect,value.modspeed);
                if(value.hasOwnProperty('loopsound')) aggrosong.play();
            }
            if(value.target == 'sub' || value.target == 'both'){
                for(let i = 0; i < subtarget.length ; i++){
                     if(value.hasOwnProperty('attack')){
                        var thisattack = value.attack;
                        thisattack = triggerBuff(thisturn,'damage',thisattack);
                        dealDamage(subtarget[i], thisattack);
                    }
                    if(value.hasOwnProperty('heal')) heal(subtarget[i], value.heal);
                    if(value.hasOwnProperty('energy')) addEnergy(subtarget[i], value.energy);
                    if(value.hasOwnProperty('wait')) addWait(subtarget[i], value.wait);
                    if(value.hasOwnProperty('setwait')) setWait(subtarget[i], value.setwait);
                    if(value.hasOwnProperty('addskillpoint')) addSkillpoint(getTeamFromSlot(subtarget[i]), value.addskillpoint);
                    if(value.hasOwnProperty('buff')) addBuff(subtarget[i], value.buff);

                    if(value.hasOwnProperty('death')) kill(subtarget[i]);
                    if(value.hasOwnProperty('giveturn')) giveTurn(subtarget[i]);
                }
            }
        })
    }

    }
    function queueSpecial(slot){
        specialOrder.push(slot);
        slotToObject(slot).specialReserved = true;
        refreshTurnIndicator();
        if(isSpecialTurn == 0){
            endTurn();
        }
    }

    function refreshCharacterStatus(){
        for(let i = 0 ; i < 8 ; i++){
            var char = slotToObject(i);
            char.hpbar.setSize(90*(char.nowhp/char.maxhp),10);
            char.hptext.setText(char.nowhp+'/'+char.maxhp);
            char.energybar.setSize(90*(char.nowenergy/char.maxenergy),10);
            char.energytext.setText(char.nowenergy+'/'+char.maxenergy);
            if(char.alive == 0) char.image.setTint(0x400000);

            if(char.nowenergy >= char.maxenergy)    char.specialbutton.setVisible(true);
            else                                    char.specialbutton.setVisible(false);
        }
    }

    function isTargetExist(charSlot,move){
        var savetarget = targetselect;
        var savethisturn = thisturn;
        var targetexist = 0;
        thisturn = charSlot;
        for(let i = 0 ; i < 8 ; i++){
            if(setTarget(i,move) == true) targetexist++;
        }
        targetselect = savetarget;
        thisturn = savethisturn;
        return (targetexist > 0);
    }
    function isSpecialAvailable(slot){
        return (slotToObject(slot).alive == 1 && slotToObject(slot).nowenergy >=slotToObject(slot).maxenergy && slotToObject(slot).specialReserved == 0 && isTargetExist(slot,2) == 1);
    }
    function isSkillAvailable(player,cost){
        if(isTargetExist(thisturn, 1) == 0) return 0;
        if(triggerBuff(thisturn,'selectmove',1) == 0) return 0;

        if(skill[player-1] >= cost) return 1;
        return 0;
    }
    function addSkillpoint(player,add){
        skill[player-1] = valueInRange(0,5,add,skill[player-1]);
        refreshSkillIndicator();
    }
    function refreshSkillIndicator(){
        for(let i = 0; i < 5; i++){
            skillIndicator1.getChildren()[i].setVisible( (i < skill[0]) );
            skillIndicator2.getChildren()[i].setVisible( (i < skill[1]) );
        }
    }

    function countAlive(team){
        var p1survivor = 0, p2survivor = 0;
        for(let i = 0 ; i < 4 ; i++){
            p1survivor += p1char[i].alive;
            p2survivor += p2char[i].alive;
        }
        if(team == 1) return p1survivor;
        if(team == 2) return p2survivor;
        return -1;
    }
    function getTeamFromSlot(slot){
        if(slot < 4) return 1;
        else return 2;
    }
    function getSlotFromName(name){
        for(let i = 0 ; i < 8 ; i++){
            if(slotToObject(i).name == name) return i;
        }
        return -1;
    }

    

    var config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        physics: {
            default: 'arcade'
        },
        scene: [Scene1,Scene2],
        parent : "gamewindow"
    };

    var game = new Phaser.Game(config);
